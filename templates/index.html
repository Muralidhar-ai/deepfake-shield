<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepFake Shield</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>🛡️ DeepFake Shield</h1>
            <p>Upload any image and find out if it is Real or Fake in seconds</p>
        </div>

        <div class="upload-box" id="uploadBox">
            <input type="file" id="imageInput" accept="image/*">
            <div class="upload-content">
                <div class="upload-icon">📁</div>
                <p>Click to upload or drag and drop an image</p>
                <span>Supports JPG, PNG, WEBP</span>
            </div>
        </div>

        <div class="preview-box" id="previewBox" style="display:none;">
            <img id="previewImage" src="" alt="Uploaded Image">
        </div>

        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeImage()" style="display:none;">
            🔍 Analyze Image
        </button>

        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Gemini AI is analyzing the image...</p>
        </div>

        <div class="result-box" id="resultBox" style="display:none;">

            <div class="verdict" id="verdictBox">
                <h2 id="verdictText"></h2>
            </div>

            <div class="details">
                <div class="detail-card">
                    <span>Confidence</span>
                    <strong id="confidenceText"></strong>
                </div>
                <div class="detail-card">
                    <span>Risk Level</span>
                    <strong id="riskText"></strong>
                </div>
            </div>

            <div class="signals-box">
                <h3>Detected Signals</h3>
                <p id="signalsText"></p>
            </div>

            <div class="explanation-box">
                <h3>Explanation</h3>
                <p id="explanationText"></p>
            </div>

            <button class="reset-btn" onclick="resetApp()">🔄 Analyze Another Image</button>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
